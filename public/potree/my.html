<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>PCD Viewer</title>

	<link rel="stylesheet" type="text/css" href="./build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="./libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="./libs/spectrum/spectrum.js"></script>
	<script src="./libs/jquery-ui/jquery-ui.min.js"></script>
	
	
	<script src="./libs/other/BinaryHeap.js"></script>
	<script src="./libs/tween/tween.min.js"></script>
	<script src="./libs/d3/d3.js"></script>
	<script src="./libs/proj4/proj4.js"></script>
	<script src="./libs/openlayers3/ol.js"></script>
	<script src="./libs/i18next/i18next.js"></script>
	<script src="./libs/jstree/jstree.js"></script>
	<script src="./build/potree/potree.js"></script>
	<!-- laslaz.js omitted: only needed for raw LAS/LAZ drag-drop; our pipeline
	     serves pre-converted Potree octree files. Keeping it caused a duplicate
	     Three.js import that corrupted the render loop. -->
	
	<!-- INCLUDE ADDITIONAL DEPENDENCIES HERE -->
	<!-- INCLUDE SETTINGS HERE -->
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area"></div>
		<div id="potree_sidebar_container"> </div>
	</div>

	<!-- Overlay controls that work with Potree 2.x OctreeLoader format -->
	<div id="pcd_controls" style="
		position: absolute; bottom: 16px; right: 16px;
		background: rgba(0,0,0,0.65); color: #fff;
		padding: 12px 16px; border-radius: 8px;
		font-family: sans-serif; font-size: 13px;
		display: flex; flex-direction: column; gap: 10px;
		min-width: 220px; z-index: 9999;
		backdrop-filter: blur(4px);
	">
		<div style="font-weight:600; margin-bottom:2px; letter-spacing:.5px;">Point Cloud Controls</div>

		<label style="display:flex; flex-direction:column; gap:4px;">
			Point Size <span id="lbl_size">1 px</span>
			<input id="sld_size" type="range" min="1" max="8" step="0.5" value="1"
				style="width:100%; cursor:pointer;">
		</label>

		<label style="display:flex; flex-direction:column; gap:4px;">
			Brightness <span id="lbl_bright">1.0</span>
			<input id="sld_bright" type="range" min="0.2" max="3.0" step="0.1" value="1.0"
				style="width:100%; cursor:pointer;">
		</label>

		<label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
			<input id="chk_edl" type="checkbox">
			Eye-Dome Lighting
		</label>

		<button id="btn_fit" style="
			background:#2563eb; border:none; color:#fff;
			padding:6px 0; border-radius:5px; cursor:pointer; font-size:13px;
		">Reset Camera</button>
	</div>
	
	<script type="module">

		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(false);
		viewer.setFOV(60);
		viewer.setPointBudget(10_000_000);
		viewer.loadSettingsFromURL();
		viewer.setBackground("gradient");
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_clipping").next().show();
			viewer.toggleSidebar();
		});

		// Resolve point cloud URL: prefer the ?url= query parameter so the
		// parent page can inject a per-asset URL; fall back to the local sample.
		const _params = new URLSearchParams(window.location.search);
		const pointcloudUrl = _params.get("url") || "../PCD/potree/metadata.json";
		
		console.log("[PCD] loading:", pointcloudUrl);

		Potree.loadPointCloud(pointcloudUrl, "scan", e => {
			if (!e || !e.pointcloud) {
				console.error("[PCD] load failed — e.pointcloud is missing", e);
				return;
			}

			let scene   = viewer.scene;
			let pointcloud = e.pointcloud;
			let material   = pointcloud.material;

			material.size          = 1;
			material.pointSizeType = Potree.PointSizeType.FIXED;
			material.shape         = Potree.PointShape.CIRCLE;

			scene.addPointCloud(pointcloud);
			viewer.fitToScreen(0.6);
			setTimeout(() => viewer.fitToScreen(0.6), 500);

			// ── Wire up overlay controls ──────────────────────────────────────
			// The built-in sidebar budget/LOD sliders are no-ops for Potree 2.x
			// octree format (OctreeLoader returns numPoints=0 so budget checks
			// never trigger). These controls go directly to the material/viewer.

			const sldSize  = document.getElementById("sld_size");
			const lblSize  = document.getElementById("lbl_size");
			sldSize.addEventListener("input", () => {
				const v = parseFloat(sldSize.value);
				lblSize.textContent = v + " px";
				material.size = v;
			});

			const sldBright = document.getElementById("sld_bright");
			const lblBright = document.getElementById("lbl_bright");
			sldBright.addEventListener("input", () => {
				const v = parseFloat(sldBright.value);
				lblBright.textContent = v.toFixed(1);
				material.rgbBrightness = v - 1.0;
			});

			const chkEDL = document.getElementById("chk_edl");
			chkEDL.addEventListener("change", () => {
				viewer.setEDLEnabled(chkEDL.checked);
			});

			document.getElementById("btn_fit").addEventListener("click", () => {
				viewer.fitToScreen(0.6);
			});
		});

	</script>
	
	
  </body>
</html>
